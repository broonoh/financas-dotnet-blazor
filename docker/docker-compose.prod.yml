version: "3.9"

# Overrides de produção — usar com:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports: []  # Não expor porta do banco em produção

  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      JwtSettings__SecretKey: ${JWT_SECRET_KEY}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  web:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
