version: "3.9"

services:
  # ================================================
  # PostgreSQL
  # ================================================
  postgres:
    image: postgres:16-alpine
    container_name: minhasfinancas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: minhas_financas
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d minhas_financas"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - minhasfinancas_net

  # ================================================
  # API .NET
  # ================================================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: minhasfinancas_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=minhas_financas;Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}"
      JwtSettings__SecretKey: ${JWT_SECRET_KEY:-dev-secret-key-minhas-financas-2024-muito-segura}
      JwtSettings__Issuer: MinhasFinancas
      JwtSettings__Audience: MinhasFinancasApp
      Cors__AllowedOrigins: "http://localhost,http://localhost:80"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - minhasfinancas_net

  # ================================================
  # Frontend Blazor WASM (Nginx)
  # ================================================
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: minhasfinancas_web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - minhasfinancas_net

volumes:
  postgres_data:
    name: minhasfinancas_pgdata

networks:
  minhasfinancas_net:
    name: minhasfinancas_network
    driver: bridge
